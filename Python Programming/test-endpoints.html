<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Endpoints Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>API Endpoints Test</h1>
    
    <button onclick="testHealth()">Test Health</button>
    <button onclick="testGetQuestion()">Test Get Question</button>
    <button onclick="testExcelData()">Test Excel Data</button>
    <button onclick="testDownload()">Test Download</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'https://academic-portal-y4my.onrender.com/api';
        const resultsDiv = document.getElementById('results');

        function addResult(message, type = 'loading') {
            const div = document.createElement('div');
            div.className = `test ${type}`;
            div.innerHTML = message;
            resultsDiv.appendChild(div);
            return div;
        }

        async function testHealth() {
            const resultDiv = addResult('Testing health endpoint...', 'loading');
            try {
                const response = await fetch(`${API_BASE}/../health`);
                const data = await response.json();
                resultDiv.className = 'test success';
                resultDiv.innerHTML = `<strong>Health Check Success!</strong><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.className = 'test error';
                resultDiv.innerHTML = `<strong>Health Check Failed:</strong><br>${error.message}`;
            }
        }

        async function testGetQuestion() {
            const resultDiv = addResult('Testing get_question endpoint...', 'loading');
            try {
                const response = await fetch(`${API_BASE}/get_question`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ excluded_ids: [] })
                });
                const data = await response.json();
                resultDiv.className = 'test success';
                resultDiv.innerHTML = `<strong>Get Question Success!</strong><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                resultDiv.className = 'test error';
                resultDiv.innerHTML = `<strong>Get Question Failed:</strong><br>${error.message}`;
            }
        }

        async function testExcelData() {
            const resultDiv = addResult('Testing excel_data endpoint...', 'loading');
            try {
                const response = await fetch(`${API_BASE}/excel_data`);
                const contentType = response.headers.get('content-type');
                resultDiv.innerHTML = `<strong>Excel Data Response:</strong><br>Content-Type: ${contentType}<br>`;
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    resultDiv.className = 'test success';
                    resultDiv.innerHTML += `<strong>Success!</strong><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    const text = await response.text();
                    resultDiv.className = 'test error';
                    resultDiv.innerHTML += `<strong>Error - Not JSON!</strong><br><pre>${text.substring(0, 500)}...</pre>`;
                }
            } catch (error) {
                resultDiv.className = 'test error';
                resultDiv.innerHTML = `<strong>Excel Data Failed:</strong><br>${error.message}`;
            }
        }

        async function testDownload() {
            const resultDiv = addResult('Testing download endpoint...', 'loading');
            try {
                const response = await fetch(`${API_BASE}/../download_excel`);
                resultDiv.className = 'test success';
                resultDiv.innerHTML = `<strong>Download Endpoint Response:</strong><br>Status: ${response.status}<br>Content-Type: ${response.headers.get('content-type')}<br>Click <a href="${API_BASE}/../download_excel" target="_blank">here to download</a>`;
            } catch (error) {
                resultDiv.className = 'test error';
                resultDiv.innerHTML = `<strong>Download Failed:</strong><br>${error.message}`;
            }
        }

        // Auto-test all endpoints
        window.onload = async () => {
            await testHealth();
            await testGetQuestion();
            await testExcelData();
            await testDownload();
        };
    </script>
</body>
</html>
