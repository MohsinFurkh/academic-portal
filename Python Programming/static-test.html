<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Programming Test - Static Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .test-area {
            display: none;
        }

        .question-box {
            background: #f7fafc;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .timer {
            background: #2d3748;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .timer.warning {
            background: #f59e0b;
            animation: pulse 1s infinite alternate;
        }

        .timer.critical {
            background: #e53e3e;
            animation: criticalPulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        @keyframes criticalPulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .CodeMirror {
            height: 300px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .result-area {
            display: none;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .result-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result-fail {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .result-partial {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .instruction-box {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .instruction-box h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .instruction-box code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fab fa-python"></i> Python Programming Test</h1>
            <p>Complete the programming challenges below</p>
        </div>

        <!-- Setup Area -->
        <div id="setup-area">
            <div class="form-group">
                <label for="student-name">Student Name *</label>
                <input type="text" id="student-name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="sap-id">SAP ID *</label>
                <input type="text" id="sap-id" placeholder="Enter your SAP ID" required>
            </div>
            <button class="btn" id="btn-start">
                <i class="fas fa-play"></i> Get Random Question & Start Timer
            </button>
        </div>

        <!-- Test Area -->
        <div id="test-area" class="test-area">
            <div class="timer" id="timer">
                <i class="fas fa-clock"></i>
                <span id="time-display">05:00</span>
            </div>

            <div class="question-box">
                <h3 id="question-text">Loading question...</h3>
            </div>

            <div id="instruction-box" class="instruction-box" style="display: none;">
                <h4>Sample Input/Output:</h4>
                <p><strong>Input:</strong> <code id="sample-input">-</code></p>
                <p><strong>Output:</strong> <code id="sample-output">-</code></p>
            </div>

            <textarea id="code-editor"># Write your Python code here...</textarea>

            <button class="btn" id="btn-submit">
                <i class="fas fa-paper-plane"></i> Submit Solution
            </button>
        </div>

        <!-- Result Area -->
        <div id="result-area" class="result-area"></div>
    </div>

    <script>
        // Static questions data (embedded in HTML)
        const questions = [
            {
                id: 1,
                text: "Write a Python program to swap two numbers without using a temporary variable.",
                test_cases: [
                    { input: "3 7", expected_output: "7 3" },
                    { input: "10 20", expected_output: "20 10" },
                    { input: "0 5", expected_output: "5 0" },
                    { input: "-3 8", expected_output: "8 -3" },
                    { input: "100 200", expected_output: "200 100" }
                ]
            },
            {
                id: 2,
                text: "Write a Python program to check whether a number is even or odd.",
                test_cases: [
                    { input: "10", expected_output: "Even" },
                    { input: "7", expected_output: "Odd" },
                    { input: "0", expected_output: "Even" },
                    { input: "1", expected_output: "Odd" },
                    { input: "-4", expected_output: "Even" }
                ]
            },
            {
                id: 3,
                text: "Write a Python program to find the largest of three numbers.",
                test_cases: [
                    { input: "3 7 2", expected_output: "7" },
                    { input: "10 5 8", expected_output: "10" },
                    { input: "1 1 1", expected_output: "1" },
                    { input: "-3 -1 -5", expected_output: "-1" },
                    { input: "0 0 5", expected_output: "5" }
                ]
            }
        ];

        let editor;
        let timerInterval;
        let timeLeft = 300; // 5 minutes
        let currentQuestion = null;
        let shownQuestions = new Set();

        // Initialize CodeMirror
        document.addEventListener("DOMContentLoaded", () => {
            editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
                mode: "python",
                theme: "default",
                lineNumbers: true,
                indentUnit: 4,
                matchBrackets: true,
                autoCloseBrackets: true
            });
            editor.setValue("# Write your Python code here...");
        });

        // Start test
        document.getElementById('btn-start').addEventListener('click', () => {
            const name = document.getElementById('student-name').value.trim();
            const sapId = document.getElementById('sap-id').value.trim();

            if (!name || !sapId) {
                alert("Please enter both your Student Name and SAP ID.");
                return;
            }

            startTest();
        });

        function startTest() {
            // Get random question that hasn't been shown
            const availableQuestions = questions.filter(q => !shownQuestions.has(q.id));
            
            if (availableQuestions.length === 0) {
                alert("All questions have been completed! Refresh to start again.");
                return;
            }

            currentQuestion = availableQuestions[Math.floor(Math.random() * availableQuestions.length)];
            shownQuestions.add(currentQuestion.id);

            // Update UI
            document.getElementById('question-text').textContent = currentQuestion.text;
            
            // Show sample I/O
            const sampleCase = currentQuestion.test_cases[0];
            document.getElementById('sample-input').textContent = sampleCase.input;
            document.getElementById('sample-output').textContent = sampleCase.expected_output;
            document.getElementById('instruction-box').style.display = 'block';

            // Switch to test area
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('test-area').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';

            // Start timer
            startTimer();

            // Request fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        function startTimer() {
            timeLeft = 300;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 60) {
                    document.getElementById('timer').classList.add('warning');
                }

                if (timeLeft <= 30) {
                    document.getElementById('timer').classList.add('critical');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitCode(true);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const seconds = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('time-display').textContent = `${minutes}:${seconds}`;
        }

        // Submit code
        document.getElementById('btn-submit').addEventListener('click', () => {
            if (confirm("Are you sure you want to submit your solution?")) {
                submitCode(false);
            }
        });

        function submitCode(autoSubmit) {
            clearInterval(timerInterval);
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.disabled = true;
            btnSubmit.textContent = autoSubmit ? "Time's Up! Evaluating..." : "Evaluating...";
            editor.setOption("readOnly", true);

            // Simulate evaluation (since we can't actually run Python code in static version)
            setTimeout(() => {
                // For demo purposes, randomly pass or fail
                const passed = Math.random() > 0.3; // 70% pass rate for demo
                const marks = passed ? 7 : Math.floor(Math.random() * 6);
                
                showResult(marks, 7);
                
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }, 2000);
        }

        function showResult(marks, total) {
            const resultArea = document.getElementById('result-area');
            resultArea.style.display = 'block';

            const percentage = (marks / total) * 100;
            let resultHTML = '';

            if (percentage === 100) {
                resultArea.className = 'result-area result-success';
                resultHTML = `<div><i class="fas fa-check-circle"></i> Great Job! You scored ${marks} / ${total} marks.</div>`;
            } else if (percentage > 0) {
                resultArea.className = 'result-area result-partial';
                resultHTML = `<div><i class="fas fa-exclamation-circle"></i> Good attempt! You scored ${marks} / ${total} marks.</div>`;
            } else {
                resultArea.className = 'result-area result-fail';
                resultHTML = `<div><i class="fas fa-times-circle"></i> Test failed. You scored ${marks} / ${total} marks.</div>`;
            }

            // Add next question button
            resultHTML += `
                <div style="margin-top: 20px;">
                    <button class="btn" onclick="nextQuestion()">
                        <i class="fas fa-arrow-right"></i> Next Question
                    </button>
                </div>
            `;

            resultArea.innerHTML = resultHTML;
        }

        function nextQuestion() {
            // Reset for next question
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('test-area').style.display = 'none';
            document.getElementById('setup-area').style.display = 'block';
            
            // Clear form
            document.getElementById('student-name').value = '';
            document.getElementById('sap-id').value = '';
            
            // Reset editor
            editor.setValue("# Write your Python code here...");
            editor.setOption("readOnly", false);
            
            // Reset submit button
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Solution';
            
            // Reset timer
            document.getElementById('timer').classList.remove('warning', 'critical');
        }
    </script>
</body>
</html>
